name: Build and push multi-arch dworshak image

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    # Ensure we don't push images for pre-releases unless intended
    if: github.event.release.prerelease == false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          TAG=${GITHUB_REF_NAME}
          LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/$LOWER_OWNER/dworshak:$TAG \
            -t ghcr.io/$LOWER_OWNER/dworshak:latest \
            -f Dockerfile.multi-dev . \
            --push
