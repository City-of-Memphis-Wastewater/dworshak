name: Docs

on:
  push:
    branches: [main]
  release:
    types: [published]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - uses: astral-sh/setup-uv@v3

      - run: uv sync --extra crypto --extra docs

      # 4. Build the wheel
      - run: uv build

      # 5. Install the wheel globally in the runner environment
      - run: pip install dist/dworshak-*.whl

      # 6. Verify CLI works
      - run: dworshak --version

      #- run: uv pip install -e ".[crypto]"

      - run: |
          chmod +x scripts/generate_cli_docs.sh
          ./scripts/generate_cli_docs.sh

      - run: mkdocs gh-deploy --force
